name: Release (Windows)

# Manual trigger only — run this after a version bump to build and publish the
# Windows installer + latest.yml to the matching GitHub Release. Mac builds are
# still cut locally (signed/notarized) via `npm run release:mac`; this only adds
# the Windows artifacts to the same release, so Windows staff can autoupdate.
on:
  workflow_dispatch:

permissions:
  contents: write # required so electron-builder can upload release assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build:ts

      - name: Build and publish Windows installer
        run: npx --no-install electron-builder --win --publish always
        env:
          # electron-builder's github publisher authenticates with GH_TOKEN.
          # The default GITHUB_TOKEN can edit releases in this repo (contents: write).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
